{% load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | IPSHIELD | HỆ THỐNG QUẢN LÝ HỢP ĐỒNG</title>

    <!-- Bootstrap (giữ đồng bộ project) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="{% static 'css/login.css' %}" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="{% static 'images/siuicon-removebg-preview.png' %}">

</head>
<body>

<div class="login-wrapper">

    <div class="login-header">
        <h1>IPSHIELD</h1>
        <p>HỆ THỐNG QUẢN LÝ HỢP ĐỒNG</p>
    </div>

    <div class="login-body">

        {% if messages %}
            {% for message in messages %}
                <div class="error-message">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" name="username" class="form-control" placeholder="Nhập username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
            </div>

            <button type="submit" class="btn-login">
                🔐 ĐĂNG NHẬP
            </button>
        </form>
    </div>

    <div class="login-footer">
        © 2024 IP Leader – All rights reserved
    </div>

</div>

</body>
</html>
