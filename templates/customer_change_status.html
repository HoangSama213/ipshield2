{% extends 'base.html' %}
{% block body_block %}

<div class="container mt-4">
    <div class="card shadow border-0 rounded-4">
        <div class="card-body">

            <h4 class="text-primary mb-3">✏ Đổi trạng thái khách hàng</h4>

            <p>
                <strong>{{ customer.customer_code }}</strong> – {{ customer.name }}
            </p>

            <form method="post">
                {% csrf_token %}
                {{ form.status }}

                <div class="mt-3">
                    <button class="btn btn-primary">💾 Cập nhật</button>
                    <a href="{% url 'customer_detail' customer.id %}" class="btn btn-secondary">
                        ⬅ Quay lại
                    </a>
                </div>
            </form>

        </div>
    </div>
</div>

{% endblock %}
