{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width:420px;margin-top:80px">
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <h5 class="mb-4 text-center">Cổng thông tin khách hàng</h5>

      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} py-2">{{ message }}</div>
      {% endfor %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Mã khách hàng</label>
          <input type="text" name="customer_code" class="form-control"
                 placeholder="VD: KH-001" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label">Mật khẩu</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
      </form>

      <hr class="my-3">
      <div class="text-center">
        <small class="text-muted">Bạn là nhân viên?</small>
        <a href="{% url 'login' %}" class="ms-1 small">Đăng nhập quản lý</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
